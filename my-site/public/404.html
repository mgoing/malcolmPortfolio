<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="refresh" content="0;url=/" />
    <script>
      // Attempt to fallback to index.html so SPA router can pick the path
      (function() {
        try {
          const url = '/' + location.pathname.replace(/^\//, '');
          location.replace(url);
        } catch(e) {
          location.replace('/');
        }
      })();
    </script>
  </head>
  <body>
    <p>Redirecting…</p>
    <p>Note: This site uses cookies and JS for a curated experience, and may be incompatible with your browser settings</p>
    <p>This site is static. The developer has 0 access to your data. Nothing is collected or processed.</p>
  </body>
</html>
